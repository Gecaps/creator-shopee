<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Banner Checkout — Creator Shopee</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .banner {
    width: 1200px;
    height: 400px;
    background: #0f172a;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }

  /* Decorative glows — same as site */
  .glow-left {
    position: absolute;
    top: -30%;
    left: -15%;
    width: 50%;
    height: 80%;
    background: rgba(178, 34, 4, 0.2);
    border-radius: 50%;
    filter: blur(100px);
  }
  .glow-right {
    position: absolute;
    bottom: -30%;
    right: -10%;
    width: 40%;
    height: 70%;
    background: rgba(214, 60, 30, 0.1);
    border-radius: 50%;
    filter: blur(80px);
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 48px;
    padding: 0 64px;
    width: 100%;
  }

  /* Left — logo + brand */
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .brand .material-symbols-outlined {
    font-size: 48px;
    color: #EE4D2D;
    font-variation-settings: 'FILL' 1;
  }
  .brand-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 28px;
    font-weight: 800;
    font-style: italic;
    color: #EE4D2D;
    letter-spacing: -0.05em;
  }

  /* Center — main copy */
  .copy {
    flex: 1;
    text-align: center;
  }
  .copy h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 40px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .copy h1 span {
    background: linear-gradient(135deg, #EE4D2D, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .copy .sub {
    font-size: 16px;
    color: #94a3b8;
    margin-bottom: 16px;
    font-weight: 400;
  }
  .copy .tags {
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
  }
  .copy .tag {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #64748b;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .copy .tag .material-symbols-outlined {
    font-size: 16px;
    color: #22c55e;
    font-variation-settings: 'FILL' 1;
  }

  /* Right — price card */
  .price-card {
    flex-shrink: 0;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 24px 32px;
    text-align: center;
    box-shadow: 0 0 50px -10px rgba(238, 77, 45, 0.2);
  }
  .price-card .old-price {
    font-size: 14px;
    color: #64748b;
    text-decoration: line-through;
    margin-bottom: 4px;
  }
  .price-card .price {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    margin-bottom: 4px;
  }
  .price-card .price .currency {
    font-size: 20px;
    font-weight: 700;
    color: #cbd5e1;
    vertical-align: super;
  }
  .price-card .price .cents {
    font-size: 24px;
  }
  .price-card .label {
    font-size: 10px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 600;
  }

  /* Bottom line accent */
  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent, #EE4D2D, #ff8c00, #EE4D2D, transparent);
  }
</style>
</head>
<body style="background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh;">

<div class="banner">
  <div class="glow-left"></div>
  <div class="glow-right"></div>

  <div class="content">
    <!-- Brand -->
    <div class="brand">
      <span class="material-symbols-outlined">local_fire_department</span>
      <span class="brand-name">Creator<br>Shopee</span>
    </div>

    <!-- Copy -->
    <div class="copy">
      <h1>De zero a <span>R$3.000/mês</span></h1>
      <p class="sub">O plano de 30 dias pra fazer sua primeira comissão como Creator Shopee</p>
      <div class="tags">
        <span class="tag">
          <span class="material-symbols-outlined">check_circle</span>
          30 dias de desafio
        </span>
        <span class="tag">
          <span class="material-symbols-outlined">check_circle</span>
          Acesso vitalício
        </span>
        <span class="tag">
          <span class="material-symbols-outlined">check_circle</span>
          Garantia 7 dias
        </span>
      </div>
    </div>

    <!-- Price -->
    <div class="price-card">
      <div class="old-price">De R$197</div>
      <div class="price"><span class="currency">R$</span>29<span class="cents">,90</span></div>
      <div class="label">Pagamento único</div>
    </div>
  </div>

  <div class="bottom-line"></div>
</div>

</body>
</html>
