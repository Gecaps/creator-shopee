<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Banner Checkout — Mentoria Creator Avançado</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .banner {
    width: 1200px;
    height: 400px;
    background: #0f172a;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }
  .glow-left {
    position: absolute;
    top: -30%;
    left: -15%;
    width: 50%;
    height: 80%;
    background: rgba(124, 58, 237, 0.15);
    border-radius: 50%;
    filter: blur(100px);
  }
  .glow-right {
    position: absolute;
    bottom: -30%;
    right: -10%;
    width: 40%;
    height: 70%;
    background: rgba(238, 77, 45, 0.1);
    border-radius: 50%;
    filter: blur(80px);
  }
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 48px;
    padding: 0 64px;
    width: 100%;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .brand .material-symbols-outlined {
    font-size: 48px;
    color: #EE4D2D;
    font-variation-settings: 'FILL' 1;
  }
  .brand-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 28px;
    font-weight: 800;
    font-style: italic;
    color: #EE4D2D;
    letter-spacing: -0.05em;
  }
  .copy {
    flex: 1;
    text-align: center;
  }
  .copy .badge {
    display: inline-block;
    background: rgba(124, 58, 237, 0.15);
    border: 1px solid rgba(124, 58, 237, 0.3);
    color: #a78bfa;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 12px;
  }
  .copy h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 38px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .copy h1 span {
    color: #a78bfa;
  }
  .copy .sub {
    font-size: 15px;
    color: #94a3b8;
    margin-bottom: 16px;
    font-weight: 400;
  }
  .copy .tags {
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
  }
  .copy .tag {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #64748b;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .copy .tag .material-symbols-outlined {
    font-size: 16px;
    color: #22c55e;
    font-variation-settings: 'FILL' 1;
  }
  .price-card {
    flex-shrink: 0;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(124, 58, 237, 0.2);
    border-radius: 16px;
    padding: 24px 32px;
    text-align: center;
    box-shadow: 0 0 50px -10px rgba(124, 58, 237, 0.2);
  }
  .price-card .price {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    margin-bottom: 4px;
  }
  .price-card .price .currency {
    font-size: 20px;
    font-weight: 700;
    color: #cbd5e1;
    vertical-align: super;
  }
  .price-card .price .cents {
    font-size: 24px;
  }
  .price-card .label {
    font-size: 10px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 600;
  }
  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent, #7c3aed, #a78bfa, #7c3aed, transparent);
  }
</style>
</head>
<body style="background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh;">
<div class="banner">
  <div class="glow-left"></div>
  <div class="glow-right"></div>
  <div class="content">
    <div class="brand">
      <span class="material-symbols-outlined">local_fire_department</span>
      <span class="brand-name">Creator<br>Shopee</span>
    </div>
    <div class="copy">
      <span class="badge">Acompanhamento por 30 dias</span>
      <h1>Mentoria <span>Creator Avançado</span></h1>
      <p class="sub">Estratégias avançadas + análise personalizada + suporte prioritário no WhatsApp</p>
      <div class="tags">
        <span class="tag"><span class="material-symbols-outlined">check_circle</span>30 dias de mentoria</span>
        <span class="tag"><span class="material-symbols-outlined">check_circle</span>Grupo VIP WhatsApp</span>
        <span class="tag"><span class="material-symbols-outlined">check_circle</span>Garantia 7 dias</span>
      </div>
    </div>
    <div class="price-card">
      <div class="price"><span class="currency">R$</span>197</div>
      <div class="label">Pagamento único</div>
    </div>
  </div>
  <div class="bottom-line"></div>
</div>
</body>
</html>
