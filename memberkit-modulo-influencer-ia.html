<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Modulo Bonus — Seu Influencer IA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #050505;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    width: 300px;
    height: 420px;
    overflow: hidden;
  }

  .card {
    width: 300px;
    height: 420px;
    position: absolute;
    top: 0;
    left: 0;
    overflow: hidden;
    border-radius: 0;
    background: linear-gradient(170deg, #02101a 0%, #010a12 50%, #00060a 100%);
  }

  /* Glow principal — ciano IA */
  .glow-main {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 60% 30%, rgba(6,182,212,0.22) 0%, transparent 55%);
    pointer-events: none;
  }

  /* Glow secundario sutil no canto inferior esquerdo */
  .glow-sub {
    position: absolute;
    width: 200px;
    height: 200px;
    bottom: -100px;
    left: -50px;
    background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Grid */
  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }

  /* === ILUSTRAÇÃO: AVATAR WIREFRAME + REDE NEURAL === */
  .illustration {
    position: absolute;
    top: 44%;
    left: 50%;
    transform: translate(-50%, -55%);
    width: 220px;
    height: 220px;
  }

  /* Cabeça wireframe central */
  .head {
    position: absolute;
    width: 96px;
    height: 96px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border: 1.5px solid rgba(6,182,212, 0.5);
    border-radius: 50%;
    background: rgba(6,182,212, 0.04);
    box-shadow:
      0 0 30px rgba(6,182,212, 0.15),
      inset 0 0 20px rgba(6,182,212, 0.05);
  }

  /* Linha vertical interna (eixo de simetria do rosto) */
  .head::before {
    content: '';
    position: absolute;
    top: 12%; bottom: 12%;
    left: 50%;
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(6,182,212, 0.2), transparent);
  }

  /* Olhos (2 pontos) */
  .eye {
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #06b6d4;
    top: 38%;
    box-shadow: 0 0 8px rgba(6,182,212, 0.7);
  }
  .eye.left { left: 28%; }
  .eye.right { right: 28%; }

  /* Boca (linha curva) */
  .mouth {
    position: absolute;
    bottom: 30%;
    left: 50%;
    transform: translateX(-50%);
    width: 22px;
    height: 6px;
    border-bottom: 1.5px solid rgba(6,182,212, 0.55);
    border-radius: 0 0 22px 22px;
  }

  /* Pontos de "scan" decorativos sobre a cabeça (linha horizontal de tracking) */
  .scan-line {
    position: absolute;
    top: 65%;
    left: 8%;
    right: 8%;
    height: 1px;
    background: linear-gradient(90deg,
      transparent,
      rgba(6,182,212, 0.4) 30%,
      rgba(6,182,212, 0.4) 70%,
      transparent
    );
  }

  /* Nodes da rede neural — 4 orbitando */
  .node {
    position: absolute;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(6,182,212, 0.18);
    border: 1.5px solid rgba(6,182,212, 0.55);
    box-shadow: 0 0 10px rgba(6,182,212, 0.35);
  }
  .node-tl { top: 8%; left: 12%; }
  .node-tr { top: 8%; right: 12%; }
  .node-bl { bottom: 12%; left: 18%; }
  .node-br { bottom: 12%; right: 18%; }

  /* Pequeno dot interno em cada node (ponto vivo) */
  .node::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #06b6d4;
    box-shadow: 0 0 6px rgba(6,182,212, 0.7);
  }

  /* Linhas conectando nodes a cabeça (SVG seria mais limpo, mas ficamos em CSS puro) */
  .line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg,
      rgba(6,182,212, 0.4) 0%,
      rgba(6,182,212, 0.15) 100%
    );
    transform-origin: left center;
  }
  /* TL -> head (centro) — distancia ~76px, angulo ~38deg */
  .line-tl {
    top: calc(8% + 6px);
    left: calc(12% + 12px);
    width: 78px;
    transform: rotate(35deg);
  }
  /* TR -> head — espelhado */
  .line-tr {
    top: calc(8% + 6px);
    right: calc(12% + 12px);
    width: 78px;
    transform: rotate(145deg);
    transform-origin: right center;
  }
  /* BL -> head */
  .line-bl {
    bottom: calc(12% + 6px);
    left: calc(18% + 12px);
    width: 70px;
    transform: rotate(-30deg);
  }
  /* BR -> head */
  .line-br {
    bottom: calc(12% + 6px);
    right: calc(18% + 12px);
    width: 70px;
    transform: rotate(-150deg);
    transform-origin: right center;
  }

  /* Glow circular em volta da cabeça (sinaliza "ativacao IA") */
  .head-aura {
    position: absolute;
    width: 150px; height: 150px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px dashed rgba(6,182,212, 0.18);
    pointer-events: none;
  }

  /* === CONTEÚDO === */
  .top-content {
    position: absolute;
    top: 24px; left: 24px; right: 24px;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.03);
  }

  .badge-bonus {
    border-color: rgba(6,182,212, 0.35);
    color: rgba(6,182,212, 0.85);
    background: rgba(6,182,212, 0.06);
  }

  .bottom-content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 2;
    padding: 60px 24px 22px;
    background: linear-gradient(0deg, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.6) 45%, rgba(0,0,0,0.2) 80%, transparent 100%);
  }

  .module-num {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 5px;
    opacity: 0.6;
    color: #06b6d4;
  }

  .module-title {
    font-size: 24px;
    font-weight: 900;
    color: #fff;
    line-height: 1.12;
    margin-bottom: 7px;
    letter-spacing: -0.5px;
  }

  .module-title .accent {
    color: #06b6d4;
  }

  .module-desc {
    font-size: 11.5px;
    color: rgba(255,255,255,0.48);
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .tag {
    display: flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 10px;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
  }

  .tag-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #06b6d4;
    flex-shrink: 0;
    box-shadow: 0 0 4px rgba(6,182,212, 0.6);
  }

  .tag.price {
    background: rgba(6,182,212, 0.1);
    border-color: rgba(6,182,212, 0.3);
    color: rgba(6,182,212, 0.95);
  }
  .tag.price .tag-dot { background: #06b6d4; }
</style>
</head>
<body>

<div class="card">
  <div class="glow-main"></div>
  <div class="glow-sub"></div>
  <div class="grid-overlay"></div>

  <div class="illustration">
    <div class="head-aura"></div>
    <div class="line line-tl"></div>
    <div class="line line-tr"></div>
    <div class="line line-bl"></div>
    <div class="line line-br"></div>
    <div class="node node-tl"></div>
    <div class="node node-tr"></div>
    <div class="node node-bl"></div>
    <div class="node node-br"></div>
    <div class="head">
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="mouth"></div>
      <div class="scan-line"></div>
    </div>
  </div>

  <div class="top-content">
    <div class="badge badge-bonus">IA · 01 · BÔNUS</div>
  </div>

  <div class="bottom-content">
    <div class="module-num">Avançado</div>
    <div class="module-title">Seu <span class="accent">Influencer IA</span></div>
    <div class="module-desc">Avatar IA fotorrealista pra vender Shopee sem aparecer</div>
    <div class="tags">
      <div class="tag"><div class="tag-dot"></div> 38 aulas</div>
      <div class="tag"><div class="tag-dot"></div> Avatar IA</div>
      <div class="tag price"><div class="tag-dot"></div> R$ 97</div>
    </div>
  </div>
</div>

</body>
</html>
